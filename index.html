<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Bootstrap link -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />
  <!-- Font awesome CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css"
    integrity="sha512-YWzhKL2whUzgiheMoBFwW8CKV4qpHQAEuvilg9FAn5VJUDwKZZxkJNuGM4XkWuk94WCrrwslk8yWNGmY1EduTA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style/style.css" />
  <title>Workshop DOM</title>
</head>

<body data-page="home">
  <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">Shopping Cart</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="index.html">Accueil</a>
            </li>
          </ul>
          <div class="header-actions">
            <a class="cart-link" href="cart.html" title="Voir le panier">
              <i class="fas fa-shopping-cart"></i>
              <span class="cart-count">0</span>
            </a>

          </div>
        </div>
      </div>
      </div>
    </nav>
  </header>
  <main>
    <section class="shopping-card-container">
      <div class="section-header">
        <h2>Produits disponibles</h2>
        <p>Ajoutez des produits à votre panier en cliquant sur l’icône panier.</p>
      </div>
      <div class="list-products">
        <div class="card-body" data-product-id="baskets">
          <div class="card shadow-sm rounded-4 h-100" style="width:18rem">
            <img src="assets/baskets.png" class="card-img-top product-image" alt="baskets" />
            <div class="card-body d-flex flex-column text-center">
              <h5 class="card-title">Baskets</h5>
              <p class="card-text flex-grow-1 mb-3">Chaussures confortables pour tous les jours.</p>
              <h4 class="unit-price">100 $</h4>
              <div class="product-actions d-flex justify-content-center gap-4 mt-3">
                <i class="fas fa-cart-plus btn-add-to-cart" title="Ajouter au panier"></i>
                <i class="fas fa-heart btn-favorite" title="Ajouter aux favoris"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body" data-product-id="socks">
          <div class="card shadow-sm rounded-4 h-100" style="width:18rem">
            <img src="assets/socks.png" class="card-img-top product-image" alt="socks" />
            <div class="card-body d-flex flex-column text-center">
              <h5 class="card-title">Socks</h5>
              <p class="card-text flex-grow-1 mb-3">Chaussettes douces et résistantes.</p>
              <h4 class="unit-price">20 $</h4>
              <div class="product-actions d-flex justify-content-center gap-4 mt-3">
                <i class="fas fa-cart-plus btn-add-to-cart" title="Ajouter au panier"></i>
                <i class="fas fa-heart btn-favorite" title="Ajouter aux favoris"></i>
              </div>
            </div>
          </div>
        </div>
        <div class="card-body" data-product-id="bag">
          <div class="card shadow-sm rounded-4 h-100" style="width:18rem">
            <img src="assets/bag.png" class="card-img-top product-image" alt="bag" />
            <div class="card-body d-flex flex-column text-center">
              <h5 class="card-title">Bag</h5>
              <p class="card-text flex-grow-1 mb-3">Sac pratique pour transporter vos affaires.</p>
              <h4 class="unit-price">50 $</h4>
              <div class="product-actions d-flex justify-content-center gap-4 mt-3">
                <i class="fas fa-cart-plus btn-add-to-cart" title="Ajouter au panier"></i>
                <i class="fas fa-heart btn-favorite" title="Ajouter aux favoris"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>
  <footer></footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
    crossorigin="anonymous"></script>

  <!-- My JS -->
  <script src="js/script.js"></script>
</body>

</html>
